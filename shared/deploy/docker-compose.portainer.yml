# SEMP reference server bundled with Caddy for TLS termination.
# Designed for deployment via Portainer Stacks (Repository mode), where
# Portainer pulls this file from the semp-reference-server repo and builds
# the SEMP container in-place.
#
# Required environment variables (set in the Portainer Stack's
# "Environment variables" section):
#
#   SEMP_HOST  the public hostname Caddy will obtain a Let's Encrypt
#              cert for (e.g. semp.example.com)
#
# Optional environment variable:
#
#   SEMP_IMPL  "go" or "ts" (default: "go"). Selects which impl the
#              upstream `semp` service builds from.
#
# Before deploying, edit shared/deploy/semp.toml in the repo to set
# the email domain and provision users.

services:
  semp:
    build:
      context: ../..
      dockerfile: docker/${SEMP_IMPL:-go}.Dockerfile
    restart: unless-stopped
    volumes:
      - semp-data:/var/lib/semp
      - ./semp.toml:/etc/semp/semp.toml:ro
    networks:
      - semp-net

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      SEMP_HOST: ${SEMP_HOST:?SEMP_HOST must be set in the stack environment variables}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - semp-net
    depends_on:
      - semp

networks:
  semp-net:

volumes:
  semp-data:
  caddy-data:
  caddy-config:
